<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>aljazira bank — app</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="app.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="app/store.jsx"></script>
<script type="text/babel" src="app/Atoms.jsx"></script>
<script type="text/babel" src="app/Components.jsx"></script>
<script type="text/babel" src="app/Screens.jsx"></script>
<script type="text/babel" src="app/Gallery.jsx"></script>
<script type="text/babel" src="app/Nav.jsx"></script>

<script type="text/babel">
const { useEffect } = React;

function AppContent() {
  const { screen, setScreen } = useApp();
  useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

  let body = null;
  if (screen === 'onboarding') body = <Onboarding />;
  else if (screen === 'home') body = <Home />;
  else if (screen === 'transactions') body = <Transactions />;
  else if (screen === 'transfer') body = <Transfer />;
  else if (screen === 'card') body = <CardScreen />;
  else if (screen === 'components') body = <ComponentsGallery />;

  return (
    <React.Fragment>
      {body}
      {screen !== 'onboarding' && <BottomTabs />}
    </React.Fragment>
  );
}

function Demo() {
  const screens = [
    { id: 'onboarding',   label: 'Welcome' },
    { id: 'home',         label: 'Home' },
    { id: 'transactions', label: 'Transactions' },
    { id: 'transfer',     label: 'Transfer' },
    { id: 'card',         label: 'Card' },
    { id: 'components',   label: 'Components' },
  ];

  function ScreenJumper() {
    const { screen, setScreen, resetTransfer } = useApp();
    return (
      <div className="ajb-demo-nav">
        {screens.map(s => (
          <button
            key={s.id}
            className={screen === s.id ? 'on' : ''}
            onClick={() => { if (s.id === 'transfer') resetTransfer(); setScreen(s.id); }}>
            {s.label}
          </button>
        ))}
      </div>
    );
  }

  return (
    <AppProvider>
      <div className="ajb-demo-page">
        <div className="ajb-demo-head">
          <h1>aljazira <span style={{color:'#b27f59'}}>app</span></h1>
          <p>An interactive prototype — five core screens plus a live component gallery.</p>
        </div>
        <IOSDevice width={390} height={844} dark>
          <AppContent />
        </IOSDevice>
        <ScreenJumper />
      </div>
    </AppProvider>
  );
}

setTimeout(() => {
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<Demo />);
  setTimeout(() => { if (window.lucide) window.lucide.createIcons(); }, 200);
}, 50);
</script>
</body>
</html>
