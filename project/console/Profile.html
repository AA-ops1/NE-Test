<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Notification Engine — Profile</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="components.css">
<link rel="stylesheet" href="login.css">
<link rel="stylesheet" href="profile.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body class="ne-page">
<div id="root"></div>

<script src="template-data.js"></script>
<script type="text/babel" src="browser-window.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="template-parts.jsx"></script>
<script type="text/babel" src="console-shell.jsx"></script>
<script type="text/babel" src="account.jsx"></script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;
const FRAMES = { desktop: { w: 1280, h: 812 }, mobile: { w: 402, h: 844 } };

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "density": "compact",
  "surface": "flat",
  "accent": "balanced",
  "profileLayout": "two-column",
  "accountPanel": "anchored"
}/*EDITMODE-END*/;

function Seg({ options, value, onChange }) {
  return (
    <div className="ajb-seg">
      {options.map((o) =>
      <button key={o.v} className={value === o.v ? 'is-on' : ''} onClick={() => onChange(o.v)}>{o.l}</button>
      )}
    </div>);
}

function PhoneFrame({ width, height, children }) {
  return (
    <div className="ne-phone" style={{ width, height }}>
      <div className="ne-phone-screen">
        <div className="ne-phone-notch" />
        {children}
      </div>
    </div>);
}

function useFit(fw, fh) {
  const ref = useRef(null);
  const [scale, setScale] = useState(1);
  useEffect(() => {
    const el = ref.current; if (!el) return;
    const recalc = () => {
      const availW = el.clientWidth - 64, availH = el.clientHeight - 64;
      setScale(Math.min(1, availW / fw, availH / fh));
    };
    recalc();
    const ro = new ResizeObserver(recalc); ro.observe(el);
    return () => ro.disconnect();
  }, [fw, fh]);
  return [ref, scale];
}

/* ============================================================
   Profile page — read-only personal info, role/permissions, sessions
   ============================================================ */
function ProfilePage({ t, lang, layout }) {
  const p = TPL.PROFILE;
  const pf = t.prof;
  const ac = t.acct;
  const dir = lang === 'ar' ? 'rtl' : 'ltr';
  const [confirm, setConfirm] = useState(false);

  const rows = [
    { k: pf.fName, v: L(p.name, lang) },
    { k: pf.fEmail, v: <span className="ajb-ltr">{p.email}</span> },
    { k: pf.fPhone, v: <span className="ajb-ltr">{p.phone}</span> },
    { k: pf.fJob, v: L(p.job, lang) },
    { k: pf.fDept, v: L(p.dept, lang) },
    { k: pf.fEmployee, v: <span className="ajb-ltr">{p.employeeId}</span> },
    { k: pf.fJoined, v: L(p.joined, lang) },
  ];

  const personal = (
    <section className="pf-sec">
      <header className="pf-sec-h"><Icon name="id-card" />{pf.secPersonal}
        <span className="ajb-badge ajb-badge--neutral pf-ro">{pf.readOnly}</span>
      </header>
      <div className="pf-dl">
        {rows.map((r, i) => (
          <div className="pf-row" key={i}>
            <span className="pf-row-k">{r.k}</span>
            <span className="pf-row-v">{r.v}</span>
          </div>
        ))}
      </div>
    </section>
  );

  const role = (
    <section className="pf-sec">
      <header className="pf-sec-h"><Icon name="shield-check" />{pf.secRole}
        <span className="ajb-badge ajb-badge--neutral pf-ro">{pf.readOnly}</span>
      </header>
      <div className="pf-role">
        <span className="pf-role-lbl">{pf.roleLbl}</span>
        <span className="pf-role-sp" />
        <span className="ajb-badge ajb-badge--sand-soft">{L(p.roleTag, lang)}</span>
      </div>
      <div className="pf-perms">
        {p.perms.map((perm) => (
          <div className={cx('pf-perm', perm.granted ? 'is-on' : 'is-off')} key={perm.id}>
            <span className="pf-perm-ico"><Icon name={perm.granted ? 'check-circle-2' : 'minus-circle'} /></span>
            <span className="pf-perm-lbl">{pf[perm.id]}</span>
            <span className={cx('ajb-badge', perm.granted ? 'ajb-badge--success' : 'ajb-badge--neutral')}>
              {perm.granted ? pf.granted : pf.notGranted}
            </span>
          </div>
        ))}
      </div>
    </section>
  );

  const sessions = (
    <section className="pf-sec">
      <header className="pf-sec-h"><Icon name="monitor-smartphone" />{pf.secSessions}</header>
      {p.sessions.map((s) => (
        <div className="pf-sess" key={s.id}>
          <span className="pf-sess-ico"><Icon name={s.icon} /></span>
          <span className="pf-sess-txt">
            <span className="pf-sess-dev">{L(s.device, lang)}</span>
            <span className="pf-sess-sub"><Icon name="map-pin" />{L(s.loc, lang)} · {L(s.last, lang)}</span>
          </span>
          {s.current && <span className="ajb-badge ajb-badge--success pf-sess-tr">{pf.current}</span>}
        </div>
      ))}
      <div className="pf-sess-note"><Icon name="info" />{pf.sessionsNote}</div>
    </section>
  );

  return (
    <div className="pf-page" data-pf-layout={layout} dir={dir}>
      <div className="pf-hd">
        <div className="pf-hd-titles">
          <span className="pf-hd-title">{pf.title}</span>
          <span className="pf-hd-sub">{pf.subtitle}</span>
        </div>
        <button type="button" className="ajb-btn ajb-btn--secondary" onClick={() => setConfirm(true)}>
          <Icon name="log-out" />{pf.signOut}
        </button>
      </div>

      <div className="pf-hero">
        <span className="ajb-avatar ajb-avatar--lg"><span>{p.initial}</span></span>
        <div className="pf-hero-id">
          <span className="pf-hero-name">{L(p.name, lang)}</span>
          <span className="pf-hero-meta">
            <span className="ajb-badge ajb-badge--sand-soft">{L(p.roleTag, lang)}</span>
            <span><Icon name="briefcase" />{L(p.job, lang)}</span>
            <span><Icon name="building-2" />{L(p.dept, lang)}</span>
          </span>
        </div>
      </div>

      <div className="pf-grid">
        {personal}
        {role}
        <div className="pf-sessions-wrap">{sessions}</div>
      </div>

      {confirm && (
        <div className="ne-acct-overlay ne-acct-overlay--dialog">
          <div className="ne-acct-scrim" onClick={() => setConfirm(false)} />
          <div className="ajb-dialog ne-acct-dialog" role="alertdialog" aria-modal="true" dir={dir}>
            <div className="ajb-dialog__ico ne-acct-dialog-ico"><Icon name="log-out" /></div>
            <h3 className="ajb-dialog__title">{ac.logoutTitle}</h3>
            <p className="ajb-dialog__text">{ac.logoutText}</p>
            <div className="ajb-dialog__actions">
              <button type="button" className="ajb-btn ajb-btn--secondary" onClick={() => setConfirm(false)}>{ac.logoutCancel}</button>
              <button type="button" className="ajb-btn ajb-btn--danger" onClick={() => { window.location.href = 'Login Journey.html'; }}>
                <Icon name="log-out" />{ac.logoutConfirm}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function Shell({ t, theme, setTheme, lang, setLang, acctVariant, children }) {
  const [collapsed, toggleSide] = useSideCollapse();
  return (
    <div className="ne-home" data-collapsed={collapsed ? '' : undefined}>
      <SideNav page="profile" t={t} collapsed={collapsed} acctVariant={acctVariant} />
      <div className="ne-main">
        <Topbar t={t} title={t.prof.title} collapsed={collapsed} onToggle={toggleSide}
          theme={theme} setTheme={setTheme} lang={lang} setLang={setLang} />
        {children}
      </div>
    </div>);
}

function App() {
  const [tw, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [theme, setTheme] = useState('dark');
  const [lang, setLang] = useState('en');
  const [device, setDevice] = useState('desktop');

  const t = TPL.T[lang];
  const dir = lang === 'ar' ? 'rtl' : 'ltr';
  const frame = FRAMES[device];
  const [fitRef, scale] = useFit(frame.w, frame.h);

  const consoleEl =
  <div className="ne-console" data-theme={theme} data-density={tw.density} data-surface={tw.surface} data-accent={tw.accent} lang={lang} dir={dir}>
      <Shell t={t} theme={theme} setTheme={setTheme} lang={lang} setLang={setLang} acctVariant={tw.accountPanel}>
        <ProfilePage t={t} lang={lang} layout={tw.profileLayout} />
      </Shell>
    </div>;

  return (
    <React.Fragment>
      <div className="ne-review">
        <div className="ne-review-brand">
          <img src="../assets/logo-white.svg" alt="aljazira bank" />
          <span>Notification Engine · Profile</span>
        </div>
        <div className="ne-ctrl">
          <span className="ne-ctrl-lbl">{t.review.device}</span>
          <Seg value={device} onChange={setDevice} options={[{ v: 'desktop', l: t.review.desktop }, { v: 'mobile', l: t.review.mobile }]} />
        </div>
        <div className="ne-ctrl">
          <span className="ne-ctrl-lbl">{t.review.theme}</span>
          <Seg value={theme} onChange={setTheme} options={[{ v: 'dark', l: t.review.dark }, { v: 'light', l: t.review.light }]} />
        </div>
        <div className="ne-ctrl">
          <span className="ne-ctrl-lbl">{t.review.lang}</span>
          <Seg value={lang} onChange={setLang} options={[{ v: 'en', l: 'EN' }, { v: 'ar', l: 'AR' }]} />
        </div>
      </div>

      <div className="ne-fit-wrap" ref={fitRef}>
        <div style={{ width: frame.w * scale, height: frame.h * scale }}>
          <div className="ne-fit" style={{ width: frame.w, height: frame.h, transform: `scale(${scale})` }}>
            {device === 'mobile' ?
            <PhoneFrame width={frame.w} height={frame.h}>{consoleEl}</PhoneFrame> :
            <ChromeWindow width={frame.w} height={frame.h} url="console.aljazira.sa/profile" tabs={[{ title: 'aljazira · notification engine' }]}>{consoleEl}</ChromeWindow>}
          </div>
        </div>
      </div>

      <TweaksPanel title="Tweaks">
        <TweakSection label="Rhythm" />
        <TweakRadio label="Density" value={tw.density}
          options={['compact', 'comfortable', 'spacious']}
          onChange={(v) => setTweak('density', v)} />
        <TweakSection label="Material" />
        <TweakRadio label="Surface" value={tw.surface}
          options={['flat', 'raised']}
          onChange={(v) => setTweak('surface', v)} />
        <TweakSection label="Brand voice" />
        <TweakRadio label="Sand accent" value={tw.accent}
          options={['reserved', 'balanced', 'expressive']}
          onChange={(v) => setTweak('accent', v)} />
        <TweakSection label="Profile layout" />
        <TweakRadio label="Sections" value={tw.profileLayout}
          options={['two-column', 'stacked']}
          onChange={(v) => setTweak('profileLayout', v)} />
        <TweakSection label="Account menu" />
        <TweakRadio label="Entry style" value={tw.accountPanel}
          options={['anchored', 'drawer']}
          onChange={(v) => setTweak('accountPanel', v)} />
      </TweaksPanel>
    </React.Fragment>);
}

setTimeout(() => {
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
}, 50);
</script>
</body>
</html>
