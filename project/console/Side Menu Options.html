<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Side menu — design options</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="components.css">
<link rel="stylesheet" href="sidebar-explore.css">
<style>
  html, body { margin: 0; height: 100%; background: var(--ajb-surface-soft); }
</style>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="sidebar-explore.jsx"></script>

<script type="text/babel">
const H = 720;
function App() {
  return (
    <DesignCanvas>
      <DCSection id="sidemenu" title="Side menu · directions"
        subtitle="Same seven destinations, five treatments. Drag a card to reorder · click its title to focus.">
        <DCArtboard id="a" label="A · Current — flat list (today)" width={232} height={H}><RailA /></DCArtboard>
        <DCArtboard id="b" label="B · Grouped + profile" width={248} height={H}><RailB /></DCArtboard>
        <DCArtboard id="c" label="C · Icon rail (collapsed)" width={84} height={H}><RailC /></DCArtboard>
        <DCArtboard id="d" label="D · Soft console — switcher + search" width={256} height={H}><RailD /></DCArtboard>
        <DCArtboard id="e" label="E · Branded — J-shape header" width={248} height={H}><RailE /></DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

setTimeout(() => {
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
}, 50);
</script>
</body>
</html>
