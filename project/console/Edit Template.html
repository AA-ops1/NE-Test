<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Notification Engine — Edit Template</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="components.css">
<link rel="stylesheet" href="login.css">
<link rel="stylesheet" href="template-studio.css">
<link rel="stylesheet" href="template-tweaks.css">
<link rel="stylesheet" href="edit-template.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body class="ne-page">
<div id="root"></div>

<script src="template-data.js"></script>
<script src="edit-extras.js"></script>
<script type="text/babel" src="browser-window.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="template-parts.jsx"></script>
<script type="text/babel" src="console-shell.jsx"></script>
<script type="text/babel" src="template-studio.jsx"></script>
<script type="text/babel" src="edit-template.jsx"></script>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;
const FRAMES = { desktop: { w: 1280, h: 812 }, mobile: { w: 402, h: 844 } };

/* ---------- expressive tweaks (reshape the journey's feel) ---------- */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "density": "compact",
  "surface": "flat",
  "accent": "balanced"
}/*EDITMODE-END*/;

/* ---------- review-bar segmented control ---------- */
function Seg({ options, value, onChange }) {
  return (
    <div className="ajb-seg">
      {options.map(o => (
        <button key={o.v} className={value === o.v ? 'is-on' : ''} onClick={() => onChange(o.v)}>{o.l}</button>
      ))}
    </div>
  );
}

/* ---------- mobile device shell ---------- */
function PhoneFrame({ width, height, children }) {
  return (
    <div className="ne-phone" style={{ width, height }}>
      <div className="ne-phone-screen">
        <div className="ne-phone-notch" />
        {children}
      </div>
    </div>
  );
}

/* ---------- fit-to-width scaler ---------- */
function useFit(fw, fh) {
  const ref = useRef(null);
  const [scale, setScale] = useState(1);
  useEffect(() => {
    const el = ref.current; if (!el) return;
    const recalc = () => {
      const availW = el.clientWidth - 64, availH = el.clientHeight - 64;
      setScale(Math.min(1, availW / fw, availH / fh));
    };
    recalc();
    const ro = new ResizeObserver(recalc); ro.observe(el);
    return () => ro.disconnect();
  }, [fw, fh]);
  return [ref, scale];
}

/* ---------- console shell (same as Create) ---------- */
function Shell({ t, theme, setTheme, lang, setLang, children }) {
  const [collapsed, toggleSide] = useSideCollapse();
  return (
    <div className="ne-home" data-collapsed={collapsed ? '' : undefined}>
      <SideNav page="templates" t={t} collapsed={collapsed} />
      <div className="ne-main">
        <Topbar t={t} title={t.nav.templates} collapsed={collapsed} onToggle={toggleSide}
          theme={theme} setTheme={setTheme} lang={lang} setLang={setLang} />
        {children}
      </div>
    </div>
  );
}

/* fingerprint excludes view-only fields so lang/tab switches don't read as edits */
function fingerprint(d) {
  const { activeLang, sampleMode, ...rest } = d;
  return JSON.stringify(rest);
}

function App() {
  const [tw, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [theme, setTheme] = useState('dark');
  const [lang, setLang] = useState('en');
  const [device, setDevice] = useState('desktop');
  const [scenario, setScenario] = useState('active'); // active | draft | errors | locked | saved
  const [showDiscard, setShowDiscard] = useState(false);
  const [reseed, setReseed] = useState(0);
  const [savedInfo, setSavedInfo] = useState({ kind: 'submit', ver: 'v4' });

  const t = TPL.T[lang];
  const dir = lang === 'ar' ? 'rtl' : 'ltr';
  const frame = FRAMES[device];
  const [fitRef, scale] = useFit(frame.w, frame.h);
  const f = useTemplateForm();
  const tpl = TPL.EDIT_TPL;
  const seedRef = useRef('');

  /* seed the form for the active scenario / language */
  useEffect(() => {
    if (scenario === 'locked' || scenario === 'saved') return;
    if (scenario === 'errors') {
      f.setData({ ...blank(), channel: 'sms', product: '', type: '', langs: ['en', 'ar'], activeLang: lang, content: { en: '', ar: '' } });
      f.setSubmitted(true);
      seedRef.current = '__errors__';
    } else {
      const d = localizedSeed(lang);
      f.setData(d); f.setSubmitted(false);
      seedRef.current = fingerprint(d);
    }
  }, [scenario, lang, reseed]);

  const isEditing = scenario === 'active' || scenario === 'draft' || scenario === 'errors';
  const dirty = isEditing && (scenario === 'errors' ? true : fingerprint(f.data) !== seedRef.current);

  const verLabel = scenario === 'draft' ? 'v' + tpl.draftVer : 'v' + tpl.activeVer;
  const nextLabel = 'v' + (tpl.activeVer + 1);
  const status = scenario === 'draft' ? 'draft' : 'active';

  const versions = scenario === 'draft' ? TPL.DRAFT_VERSIONS : TPL.VERSIONS;
  const newVer = (scenario === 'active' || scenario === 'errors') && dirty
    ? { ver: nextLabel, status: 'draft', acted: 'edited', who: { en: 'A. Al Amri', ar: 'عبدالرحمن العمري' }, when: { en: 'just now', ar: 'الآن' }, isNew: true }
    : null;

  const onSave = useCallback((kind) => {
    const ver = (kind === 'submit' || kind === 'draftNew') ? 'v' + (TPL.EDIT_TPL.activeVer + 1) : 'v' + TPL.EDIT_TPL.draftVer;
    setSavedInfo({ kind, ver });
    setScenario('saved');
  }, []);

  const onCancel = useCallback(() => {
    if (dirty) setShowDiscard(true);
    else window.location.href = 'View Template.html';
  }, [dirty]);

  const onDiscard = useCallback(() => {
    setShowDiscard(false);
    window.location.href = 'View Template.html';
  }, []);

  let body;
  if (scenario === 'locked') {
    body = <LockedState t={t} lang={lang} tpl={tpl} onList={() => { window.location.href = 'Templates.html'; }} />;
  } else if (scenario === 'saved') {
    body = <EditSaved t={t} lang={lang} tpl={tpl} kind={savedInfo.kind} verLabel={savedInfo.ver}
      onBack={() => window.location.href = 'View Template.html'} onView={() => window.location.href = 'View Template.html'} />;
  } else {
    body = <EditWorkspace f={f} t={t} lang={lang} scenario={scenario} tpl={tpl}
      status={status} verLabel={verLabel} nextLabel={nextLabel} dirty={dirty}
      onCancel={onCancel} onSave={onSave} versions={versions} newVer={newVer} />;
  }

  const url = scenario === 'locked' ? 'console.aljazira.sa/templates/' + tpl.id
    : scenario === 'saved' ? 'console.aljazira.sa/templates/' + tpl.id + '?saved=1'
    : 'console.aljazira.sa/templates/' + tpl.id + '/edit';

  const consoleEl = (
    <div className="ne-console" data-theme={theme} data-density={tw.density} data-surface={tw.surface} data-accent={tw.accent} lang={lang} dir={dir}>
      <Shell t={t} theme={theme} setTheme={setTheme} lang={lang} setLang={setLang}>{body}</Shell>
      {showDiscard && <DiscardDialog t={t} onKeep={() => setShowDiscard(false)} onDiscard={onDiscard} />}
    </div>
  );

  return (
    <React.Fragment>
      <div className="ne-review">
        <div className="ne-review-brand">
          <img src="../assets/logo-white.svg" alt="aljazira bank" />
          <span>Notification Engine · Edit template</span>
        </div>
        <div className="ne-ctrl">
          <span className="ne-ctrl-lbl">{t.revScenario}</span>
          <Seg value={scenario} onChange={setScenario} options={[
            { v: 'active', l: t.revActive }, { v: 'draft', l: t.revDraft },
            { v: 'errors', l: t.revErrors }, { v: 'locked', l: t.revLocked }, { v: 'saved', l: t.revSaved }]} />
        </div>
        <div className="ne-ctrl">
          <span className="ne-ctrl-lbl">{t.review.device}</span>
          <Seg value={device} onChange={setDevice} options={[{ v: 'desktop', l: t.review.desktop }, { v: 'mobile', l: t.review.mobile }]} />
        </div>
        <div className="ne-ctrl">
          <span className="ne-ctrl-lbl">{t.review.theme}</span>
          <Seg value={theme} onChange={setTheme} options={[{ v: 'dark', l: t.review.dark }, { v: 'light', l: t.review.light }]} />
        </div>
        <div className="ne-ctrl">
          <span className="ne-ctrl-lbl">{t.review.lang}</span>
          <Seg value={lang} onChange={setLang} options={[{ v: 'en', l: 'EN' }, { v: 'ar', l: 'AR' }]} />
        </div>
      </div>

      <div className="ne-fit-wrap" ref={fitRef}>
        <div style={{ width: frame.w * scale, height: frame.h * scale }}>
          <div className="ne-fit" style={{ width: frame.w, height: frame.h, transform: `scale(${scale})` }}>
            {device === 'mobile'
              ? <PhoneFrame width={frame.w} height={frame.h}>{consoleEl}</PhoneFrame>
              : <ChromeWindow width={frame.w} height={frame.h} url={url} tabs={[{ title: 'aljazira · notification engine' }]}>{consoleEl}</ChromeWindow>}
          </div>
        </div>
      </div>

      <TweaksPanel title="Tweaks">
        <TweakSection label="Rhythm" />
        <TweakRadio label="Density" value={tw.density}
          options={['compact', 'comfortable', 'spacious']}
          onChange={(v) => setTweak('density', v)} />
        <TweakSection label="Material" />
        <TweakRadio label="Surface" value={tw.surface}
          options={['flat', 'raised']}
          onChange={(v) => setTweak('surface', v)} />
        <TweakSection label="Brand voice" />
        <TweakRadio label="Sand accent" value={tw.accent}
          options={['reserved', 'balanced', 'expressive']}
          onChange={(v) => setTweak('accent', v)} />
      </TweaksPanel>
    </React.Fragment>
  );
}

setTimeout(() => {
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
}, 50);
</script>
</body>
</html>
